apiVersion: v1
kind: ServiceAccount
metadata:
  name: xmb-api
  namespace: psp-xmb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: xmb-api-game-session
  namespace: psp-xmb
rules:
  # Read the deployment (for status/reconciliation) but NOT patch it — the app
  # only ever mutates the scale subresource below, so withholding `patch` here
  # prevents the SA from changing the game-session image/env/command.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["game-session"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["game-session"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: xmb-api-game-session
  namespace: psp-xmb
subjects:
  - kind: ServiceAccount
    name: xmb-api
    namespace: psp-xmb
roleRef:
  kind: Role
  name: xmb-api-game-session
  apiGroup: rbac.authorization.k8s.io
