# PulseAudio tuning for streamed audio (dropped into /etc/pulse/daemon.conf.d/).
# The container has no sound card, so audio runs through a timer-scheduled null
# sink whose monitor Selkies captures. Pin the sample rate so PulseAudio never
# resamples — the game, the sink and Opus are all 48 kHz. (Realtime/low-latency
# scheduling was tried and made it worse — it drove the sink to a 1ms buffer —
# so it is intentionally omitted. The real chompiness fix is RetroArch's
# audio_sync; see retroarch.cfg.)
default-sample-rate = 48000
alternate-sample-rate = 48000
