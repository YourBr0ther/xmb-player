# session/retroarch.cfg — RetroArch as an invisible runtime: fullscreen
# into Xvfb, audio to PulseAudio, saves/states on PVCs, network command
# interface for Phase 2+ (save/load state from the web XMB).
video_driver = "gl"
video_fullscreen = "true"
video_windowed_fullscreen = "true"
video_vsync = "true"
audio_driver = "pulse"
audio_enable = "true"
# Streaming audio smoothness: RetroArch's default 64ms buffer underruns against
# PulseAudio (which capped the request to a smaller buffer), producing crackly
# "chompy" audio. A larger buffer + dynamic rate control absorbs the drift
# between the emulator clock and the WebRTC capture clock.
audio_latency = "192"
audio_sync = "true"
audio_rate_control = "true"
audio_rate_control_delta = "0.005"
audio_max_timing_skew = "0.05"
network_cmd_enable = "true"
network_cmd_port = "55355"
savefile_directory = "/saves"
savestate_directory = "/states"
system_directory = "/opt/retroarch/system"
input_autodetect_enable = "true"
pause_nonactive = "false"
quit_press_twice = "false"
menu_driver = "rgui"
config_save_on_exit = "false"
